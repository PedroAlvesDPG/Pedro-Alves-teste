# Sobe o PostgreSQL (banco) e o Adminer (interface web pra ver o banco).
# Uso:
#   docker compose up -d      -> sobe em segundo plano
#   docker compose ps         -> ver status
#   docker compose down       -> para (mantém os dados)
#   docker compose down -v    -> para e APAGA os dados (volume)
services:
  postgres:
    image: postgres:16
    container_name: monitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
    ports:
      - "5432:5432"          # host:container — a API conecta em localhost:5432
    volumes:
      - monitor-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4
    container_name: monitor-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"          # abra http://localhost:8080 no navegador
    depends_on:
      - postgres

volumes:
  monitor-pgdata:
